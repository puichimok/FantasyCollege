<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox Grimoire - 魔法學院</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts (Cinzel 作為魔法標題字體，Noto Sans TC 作為內文) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-glow: 0 0 15px rgba(99, 102, 241, 0.6);
            --success-glow: 0 0 25px rgba(34, 197, 94, 0.8);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .font-magic {
            font-family: 'Cinzel', serif;
        }

        .font-code {
            font-family: 'Fira Code', monospace;
        }

        /* 背景星空與魔法漸層 */
        .magic-bg {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0b0f19 100%);
            position: relative;
        }

        .magic-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.05"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        /* 編輯器與側邊欄樣式 */
        #sidebar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        /* 編輯器輸入區 */
        .editor-container {
            background: #0f111a;
            border-radius: 8px;
            border: 1px solid #334155;
            padding: 1rem;
            position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        #css-input {
            width: 100%;
            background: transparent;
            border: none;
            color: #a5b4fc;
            outline: none;
            resize: none;
            line-height: 1.5;
            min-height: 80px;
        }

        #css-input::placeholder {
            color: #475569;
        }

        /* 魔法陣區域 (Flex Container) */
        #arena {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .spell-field {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            position: relative;
            border: 2px dashed rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* 背景魔法陣裝飾 */
        .spell-field::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 共通 Flex 容器 */
        .flex-layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            padding: 1rem;
            pointer-events: none; /* 讓點擊穿透 */
        }

        /* 目標與魔物 (Targets) */
        .target {
            width: 60px; height: 60px;
            background-color: rgba(225, 29, 72, 0.1);
            border: 2px dashed rgba(225, 29, 72, 0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            opacity: 0.8;
            transition: all 0.3s ease;
        }

        /* 玩家魔法球 (Spells) */
        .spell {
            width: 60px; height: 60px;
            background: radial-gradient(circle at 30% 30%, #a5b4fc, #4f46e5);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(79, 70, 229, 0.8), inset 0 0 10px rgba(255,255,255,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            animation: float 3s ease-in-out infinite;
            z-index: 5;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); /* 加入彈性動畫讓移動更好看 */
        }

        /* 動畫 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        @keyframes successPulse {
            0% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); border-color: #22c55e; }
            50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.9); border-color: #4ade80; }
            100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5); border-color: #22c55e; }
        }

        .win-state .spell {
            background: radial-gradient(circle at 30% 30%, #86efac, #16a34a);
            box-shadow: var(--success-glow);
            animation: float 2s ease-in-out infinite;
        }

        .win-state .target {
            border-color: transparent;
            background-color: transparent;
            opacity: 0; /* 成功時隱藏目標框 */
        }

        .win-state .spell-field {
            animation: successPulse 2s infinite;
        }

        /* 響應式佈局 */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; border-right: none; border-bottom: 1px solid rgba(99, 102, 241, 0.3); }
            #arena { height: 50vh; }
        }
    </style>
</head>
<body class="magic-bg flex flex-col md:flex-row">

    <section id="sidebar" class="w-full md:w-1/3 lg:w-2/5 flex flex-col h-[50vh] md:h-full">
        <div class="p-6 flex-grow overflow-y-auto">
            <h1 class="font-magic text-3xl md:text-4xl text-indigo-300 mb-2 font-bold tracking-wider text-center md:text-left drop-shadow-lg">
                Flexbox<br/>Grimoire
            </h1>
            <div class="flex items-center justify-between mb-6 border-b border-indigo-900/50 pb-2">
                <span class="text-indigo-400 text-sm font-bold uppercase tracking-widest" id="level-indicator">Level 1 of 4</span>
                <div class="flex gap-2">
                    <button id="prev-btn" class="w-8 h-8 rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 disabled:opacity-30 flex items-center justify-center transition-colors">◀</button>
                    <button id="next-lvl-btn" class="w-8 h-8 rounded bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 disabled:opacity-30 flex items-center justify-center transition-colors">▶</button>
                </div>
            </div>

            <h2 id="level-title" class="text-xl text-white font-bold mb-3">第一課：基礎發射</h2>
            <p id="level-desc" class="text-slate-300 text-sm md:text-base leading-relaxed mb-6">
                見習巫師，歡迎來到魔法學院！<br><br>前方的魔法陣出現了一隻史萊姆。請在下方的魔法書中寫入 <code>justify-content</code> 咒語，將你的奧術飛彈精準擊中右側的敵人。
            </p>

            <div class="editor-container font-code text-sm md:text-base">
                <div class="text-slate-400 mb-2">#magic-circle {</div>
                <div class="pl-6 text-indigo-300">display: flex;</div>
                <div class="pl-6 relative">
                    <textarea id="css-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="/* 在此輸入咒語 */"></textarea>
                </div>
                <div class="text-slate-400 mt-1">}</div>
            </div>

            <!-- 過關按鈕 -->
            <div class="mt-6 text-center md:text-left h-12">
                <button id="next-btn" class="hidden font-magic w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded shadow-[0_0_15px_rgba(79,70,229,0.5)] transition-all transform hover:scale-[1.02]">
                    前往下一課 (Next Level) ➔
                </button>
            </div>
        </div>
    </section>

    <section id="arena" class="relative">
        <div class="spell-field shadow-2xl" id="spell-field">
            <!-- 目標圖層 (正確解答的排版) -->
            <div id="targets-layer" class="flex-layer">
                <!-- Targets injected by JS -->
            </div>
            
            <!-- 玩家控制圖層 (綁定輸入框) -->
            <div id="player-layer" class="flex-layer">
        
        <!-- 過關提示字 -->
        <div id="win-message" class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-0 transition-opacity duration-500 z-20">
            <h2 class="font-magic text-4xl text-green-400 drop-shadow-[0_0_10px_rgba(34,197,94,0.8)] font-bold text-center">
                Spell Successful!
            </h2>
        </div>
    </section>

    <script>
        // 關卡資料定義
        const levels = [
            {
                title: "第一章：奧術瞄準",
                desc: "見習巫師，歡迎來到學院靶場！<br><br>右側出現了一隻史萊姆目標。請使用 <code>justify-content</code> 屬性，將你的奧術光球對齊至容器的末端 (<span class='text-indigo-300'>flex-end</span>)，擊中目標。",
                targetStyle: "justify-content: flex-end;",
                itemsCount: 1,
                targetIcon: "👾",
                spellIcon: "🔮"
            },
            {
                title: "第二章：均衡散佈",
                desc: "一群小妖精分散在前方陣線上！<br><br>你的光球目前全擠在左邊。請使用 <code>justify-content</code>，並設定為 <span class='text-indigo-300'>space-between</span>，讓魔法均勻散佈以擊中所有妖精。",
                targetStyle: "justify-content: space-between;",
                itemsCount: 3,
                targetIcon: "🧚",
                spellIcon: "🔮"
            },
            {
                title: "第三章：垂直打擊",
                desc: "注意上方！石像鬼正在高處盤旋。<br><br>預設的交叉軸(Cross Axis)對齊是從上方開始，但我們需要往下打擊。請使用 <code>align-items</code> 將魔法往下沉至 <span class='text-indigo-300'>flex-end</span>。",
                targetStyle: "align-items: flex-end;",
                itemsCount: 2,
                targetIcon: "🦇",
                spellIcon: "☄️"
            },
            {
                title: "第四章：終極防禦結界",
                desc: "強大的魔物出現在法陣正中央！<br><br>你需要同時運用主軸與交叉軸的對齊。結合 <code>justify-content</code> 與 <code>align-items</code>，將防禦護盾完美放置在法陣的正 <span class='text-indigo-300'>center</span>！",
                targetStyle: "justify-content: center; align-items: center;",
                itemsCount: 1,
                targetIcon: "👹",
                spellIcon: "🛡️"
            },
            {
                title: "第五章：背後突襲",
                desc: "注意！有幽靈從法陣尾端潛入！<br><br>一般魔法是從左至右推進的。請使用 <code>flex-direction</code> 改變魔法流向，將其反轉為 <span class='text-indigo-300'>row-reverse</span>，給它們一個迎頭痛擊。",
                targetStyle: "flex-direction: row-reverse;",
                itemsCount: 3,
                targetIcon: "👻",
                spellIcon: "✨"
            },
            {
                title: "第六章：天譴之雷 (最終試煉)",
                desc: "深淵魔龍在法陣上空現身！<br><br>結合所學：先用 <code>flex-direction: column;</code> 讓雷擊轉為縱向，接著用 <code>align-items: center;</code> 水平置中，最後加上 <code>justify-content: space-evenly;</code> 讓落雷均勻覆蓋魔龍全身！",
                targetStyle: "flex-direction: column; align-items: center; justify-content: space-evenly;",
                itemsCount: 3,
                targetIcon: "🐉",
                spellIcon: "⚡"
            }
        ];

        let currentLevelIndex = 0;
        let isLevelComplete = false;

        // DOM 元素
        const levelTitle = document.getElementById('level-title');
        const levelDesc = document.getElementById('level-desc');
        const levelIndicator = document.getElementById('level-indicator');
        const cssInput = document.getElementById('css-input');
        const targetsLayer = document.getElementById('targets-layer');
        const playerLayer = document.getElementById('player-layer');
        const nextBtn = document.getElementById('next-btn');
        const prevLvlBtn = document.getElementById('prev-btn');
        const nextLvlBtn = document.getElementById('next-lvl-btn');
        const spellField = document.getElementById('spell-field');
        const winMessage = document.getElementById('win-message');

        // 載入關卡
        function loadLevel(index) {
            if (index < 0 || index >= levels.length) return;
            
            currentLevelIndex = index;
            const level = levels[index];
            isLevelComplete = false;

            // 更新文字資訊
            levelTitle.innerText = level.title;
            levelDesc.innerHTML = level.desc;
            levelIndicator.innerText = `Level ${index + 1} of ${levels.length}`;
            
            // 清空輸入框
            cssInput.value = "";
            
            // 設定目標圖層的解答樣式
            targetsLayer.style.cssText = level.targetStyle;
            // 重置玩家圖層樣式
            playerLayer.style.cssText = "";

            // 生成 DOM 元素
            targetsLayer.innerHTML = "";
            playerLayer.innerHTML = "";
            
            for (let i = 0; i < level.itemsCount; i++) {
                // 目標
                const target = document.createElement('div');
                target.className = 'target';
                target.innerText = level.targetIcon;
                targetsLayer.appendChild(target);

                // 魔法
                const spell = document.createElement('div');
                spell.className = 'spell';
                spell.innerText = level.spellIcon;
                playerLayer.appendChild(spell);
            }

            // UI 狀態重置
            spellField.classList.remove('win-state');
            winMessage.style.opacity = '0';
            nextBtn.classList.add('hidden');
            
            // 更新上下關按鈕狀態
            prevLvlBtn.disabled = index === 0;
            nextLvlBtn.disabled = index === levels.length - 1;

            // 確保畫面渲染後檢查一次 (避免預設就過關)
            setTimeout(checkWinCondition, 100);
        }

        // 檢查座標是否重合
        function checkWinCondition() {
            if (isLevelComplete) return;

            const targets = targetsLayer.children;
            const spells = playerLayer.children;
            let allMatch = true;

            // 確保元素數量一致才檢查
            if (targets.length === 0 || targets.length !== spells.length) return;

            for (let i = 0; i < spells.length; i++) {
                const targetRect = targets[i].getBoundingClientRect();
                const spellRect = spells[i].getBoundingClientRect();

                // 計算中心點
                const tX = targetRect.left + targetRect.width / 2;
                const tY = targetRect.top + targetRect.height / 2;
                const sX = spellRect.left + spellRect.width / 2;
                const sY = spellRect.top + spellRect.height / 2;

                // 容錯範圍 2px
                if (Math.abs(tX - sX) > 2 || Math.abs(tY - sY) > 2) {
                    allMatch = false;
                    break;
                }
            }

            if (allMatch) {
                handleWin();
            }
        }

        // 處理過關狀態
        function handleWin() {
            isLevelComplete = true;
            spellField.classList.add('win-state');
            winMessage.style.opacity = '1';
            
            // 如果不是最後一關，顯示下一關按鈕
            if (currentLevelIndex < levels.length - 1) {
                nextBtn.classList.remove('hidden');
            } else {
                // 遊戲全破
                winMessage.innerHTML = `<h2 class="font-magic text-5xl text-yellow-400 drop-shadow-[0_0_15px_rgba(234,179,8,0.8)] font-bold text-center">Master Wizard!</h2>`;
            }
        }

        // 監聽使用者輸入
        cssInput.addEventListener('input', (e) => {
            if (isLevelComplete) return; // 過關後不處理輸入

            const userInput = e.target.value;
            // 將使用者的 CSS 套用到 playerLayer 上
            playerLayer.style.cssText = userInput;

            // 延遲檢查，等待瀏覽器重新計算排版
            setTimeout(checkWinCondition, 50);
        });

        // 處理多行輸入框的 Tab 鍵
        cssInput.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = e.target.selectionStart;
                const end = e.target.selectionEnd;
                // 插入兩個空格代替 Tab
                e.target.value = e.target.value.substring(0, start) + "  " + e.target.value.substring(end);
                e.target.selectionStart = e.target.selectionEnd = start + 2;
            }
        });

        // 按鈕事件
        nextBtn.addEventListener('click', () => {
            loadLevel(currentLevelIndex + 1);
        });

        prevLvlBtn.addEventListener('click', () => {
            loadLevel(currentLevelIndex - 1);
        });

        nextLvlBtn.addEventListener('click', () => {
            loadLevel(currentLevelIndex + 1);
        });

        // 視窗大小改變時重新檢查 (因為 RWD 可能導致座標位移)
        window.addEventListener('resize', () => {
            if (!isLevelComplete) {
                setTimeout(checkWinCondition, 100);
            }
        });

        // 初始化第一關
        window.onload = () => {
            loadLevel(0);
        };
    </script>
</body>
</html>
